<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion de Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border: #dee2e6;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary) 0%, #1a252f 100%);
            color: white;
            transition: var(--transition);
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .logo-container {
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            background: rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }

        .logo i {
            color: var(--success);
            font-size: 28px;
        }

        .nav-links {
            padding: 20px 0;
        }

        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 4px solid transparent;
            margin: 5px 10px;
            border-radius: 8px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: var(--secondary);
            border-left: 4px solid var(--success);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }

        .nav-item i {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            background: #f5f7fa;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--success));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            font-weight: 600;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(231, 76, 60, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            border-color: var(--secondary);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .stat-content {
            flex: 1;
        }

        .stat-title {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
        }

        .charts-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: var(--transition);
            font-size: 14px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-lg {
            padding: 12px 24px;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #27ae60);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #d68910);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, var(--info), #138496);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            padding: 15px 12px;
            text-align: left;
            background: linear-gradient(180deg, var(--light), #e9ecef);
            font-weight: 700;
            color: var(--dark);
            border-bottom: 2px solid var(--secondary);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid var(--light-gray);
        }

        tr:hover {
            background: rgba(52, 152, 219, 0.05);
        }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: var(--transition);
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .sale-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 25px;
        }

        @media (max-width: 1200px) {
            .sale-container {
                grid-template-columns: 1fr;
            }
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: var(--secondary);
        }

        .product-image {
            height: 150px;
            background: linear-gradient(135deg, var(--light), #e9ecef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: var(--gray);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .product-price {
            color: var(--success);
            font-weight: 800;
            font-size: 18px;
        }

        .product-stock {
            font-size: 14px;
            color: var(--gray);
            margin-top: 8px;
        }

        .cart-container {
            background: white;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: fit-content;
            position: sticky;
            top: 100px;
            border: 1px solid var(--border);
        }

        .cart-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--secondary);
            color: var(--primary);
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 15px;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .cart-item-price {
            color: var(--success);
            font-weight: 700;
            font-size: 16px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
        }

        .qty-btn:hover {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .cart-summary {
            border-top: 2px solid var(--border);
            padding-top: 25px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .total-row {
            font-size: 20px;
            font-weight: 800;
            padding: 15px 0;
            border-top: 2px solid var(--border);
            margin-top: 15px;
            color: var(--primary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, var(--light), white);
            border-radius: 15px 15px 0 0;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray);
            transition: var(--transition);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--light-gray);
            color: var(--danger);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            background: var(--light);
            border-radius: 0 0 15px 15px;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .logo span, .nav-item span {
                display: none;
            }
            .logo {
                justify-content: center;
            }
            .main-content {
                margin-left: 0;
            }
        }

        .page-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page-section.active {
            display: block;
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 18px 30px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--success), #27ae60);
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 3000;
            transform: translateX(150%);
            transition: transform 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: linear-gradient(135deg, var(--danger), #c0392b);
        }

        .low-stock {
            color: var(--danger);
            font-weight: bold;
        }

        .pending-status {
            background: rgba(243, 156, 18, 0.1);
            color: var(--warning);
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .paid-status {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }

        .search-container input {
            padding-left: 50px;
            padding-right: 15px;
            height: 50px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 15px;
            width: 100%;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .invoice-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            max-width: 1000px;
            margin: 20px auto;
            font-family: 'Arial', sans-serif;
        }

        .invoice-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px solid var(--primary);
        }

        .invoice-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .invoice-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .invoice-client, .invoice-details {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        .invoice-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
        }

        .invoice-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .invoice-totals {
            margin-left: auto;
            width: 350px;
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
        }

        .print-invoice-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 600;
            color: var(--gray);
            position: relative;
            white-space: nowrap;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab.active {
            color: var(--primary);
            font-weight: 700;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--secondary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 3000;
            transform: translateX(150%);
            transition: transform 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 350px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, var(--success), #27ae60);
        }

        .toast.error {
            background: linear-gradient(135deg, var(--danger), #c0392b);
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 992px) {
            .menu-toggle {
                display: flex;
            }
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-logo i {
            font-size: 60px;
            color: var(--secondary);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success);
            color: white;
        }

        .badge-danger {
            background: var(--danger);
            color: white;
        }

        .badge-warning {
            background: var(--warning);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Page de connexion -->
    <div id="login-page" class="login-container">
        <div class="login-form">
            <div class="login-logo">
                <i class="fas fa-store"></i>
                <h1>Gestion de Stock</h1>
                <p>Système complet de gestion d'inventaire</p>
            </div>
            <div class="form-group">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" class="form-control" id="login-username" placeholder="Entrez votre nom d'utilisateur">
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="login-password" placeholder="Entrez votre mot de passe">
            </div>
            <button class="btn btn-primary" id="login-btn" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>
            <div class="login-footer" style="text-align: center; margin-top: 20px;">
                © Système de Gestion de Stock - Version 3.0
            </div>
        </div>
    </div>

    <!-- Application principale -->
    <div id="app-container" class="container" style="display: none;">
        <div class="sidebar" id="sidebar">
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-store"></i>
                    <span>GESTION STOCK</span>
                </div>
            </div>
            <div class="nav-links">
                <div class="nav-item active" data-page="dashboard">
                    <i class="fas fa-home"></i> <span>Tableau de Bord</span>
                </div>
                <div class="nav-item" data-page="products">
                    <i class="fas fa-boxes"></i> <span>Produits</span>
                </div>
                <div class="nav-item" data-page="clients">
                    <i class="fas fa-users"></i> <span>Clients</span>
                </div>
                <div class="nav-item" data-page="sales">
                    <i class="fas fa-shopping-cart"></i> <span>Ventes</span>
                </div>
                <div class="nav-item" data-page="invoices">
                    <i class="fas fa-file-invoice-dollar"></i> <span>Factures</span>
                </div>
                <div class="nav-item" data-page="cashier">
                    <i class="fas fa-cash-register"></i> <span>Caisse</span>
                </div>
                <div class="nav-item" data-page="inventory">
                    <i class="fas fa-clipboard-list"></i> <span>Inventaire</span>
                </div>
                <div class="nav-item" data-page="reports">
                    <i class="fas fa-chart-bar"></i> <span>Rapports</span>
                </div>
                <div class="nav-item" data-page="users">
                    <i class="fas fa-user-cog"></i> <span>Utilisateurs</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i> <span>Paramètres</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="header-title">
                    <i class="fas fa-tachometer-alt"></i>
                    <span id="page-title">Tableau de Bord</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div>
                        <div class="user-name" id="user-name">Administrateur</div>
                        <div class="user-role" id="user-role">Administrateur</div>
                    </div>
                    <button class="logout-btn" id="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                </div>
            </div>

            <div id="page-content">
                <!-- Contenu chargé dynamiquement -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Configuration
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentPage = 'dashboard';
        let charts = {};

        // Fonctions utilitaires
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Erreur serveur');
            }
            return response.json();
        }

        function formatPrice(number) {
            const num = typeof number === 'string' ? parseFloat(number) : number;
            if (isNaN(num)) return "0,00 FCFA";
            return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " FCFA";
        }

        function formatNumber(number) {
            const num = typeof number === 'string' ? parseFloat(number) : number;
            if (isNaN(num)) return "0";
            return num.toLocaleString('fr-FR');
        }

        // Gestion des modales
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'flex';
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none';
        }

        // Navigation
        async function showPage(page) {
            currentPage = page;
            document.getElementById('page-title').innerHTML = getPageTitle(page);
            const contentDiv = document.getElementById('page-content');
            contentDiv.innerHTML = '<div class="loader" style="display:block"></div>';
            
            try {
                if (page === 'dashboard') await loadDashboard(contentDiv);
                else if (page === 'products') await loadProducts(contentDiv);
                else if (page === 'clients') await loadClients(contentDiv);
                else if (page === 'sales') await loadSales(contentDiv);
                else if (page === 'invoices') await loadInvoices(contentDiv);
                else if (page === 'cashier') await loadCashier(contentDiv);
                else if (page === 'inventory') await loadInventory(contentDiv);
                else if (page === 'reports') await loadReports(contentDiv);
                else if (page === 'users') await loadUsers(contentDiv);
                else if (page === 'settings') await loadSettings(contentDiv);
            } catch (err) {
                contentDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erreur: ${err.message}</p></div>`;
                showToast(err.message, 'error');
            }
        }

        function getPageTitle(page) {
            const titles = {
                'dashboard': 'Tableau de Bord',
                'products': 'Gestion des Produits',
                'clients': 'Gestion des Clients',
                'sales': 'Historique des Ventes',
                'invoices': 'Gestion des Factures',
                'cashier': 'Gestion de Caisse',
                'inventory': 'Gestion des Inventaires',
                'reports': 'Rapports et Statistiques',
                'users': 'Gestion des Utilisateurs',
                'settings': 'Paramètres du Système'
            };
            return titles[page] || page;
        }

        // Dashboard
        async function loadDashboard(container) {
            const [products, clients, ventes] = await Promise.all([
                apiCall('/produits'),
                apiCall('/clients'),
                apiCall('/ventes')
            ]);
            const today = new Date().toISOString().slice(0,10);
            const todaySales = ventes.filter(v => v.date.slice(0,10) === today);
            const totalRevenue = ventes.reduce((s,v)=>s+v.montant,0);
            const lowStock = products.filter(p => p.quantite < (p.minStock||10) && p.quantite>0).length;
            const totalPurchase = products.reduce((s,p)=>s + (p.prixAchat||0)*p.quantite,0);
            const totalSaleValue = products.reduce((s,p)=>s + p.prixVente*p.quantite,0);
            
            let cashBalance = 0;
            try {
                const caisseOps = await apiCall('/caisse');
                cashBalance = caisseOps.reduce((s,o) => {
                    if (o.type === 'Entrée' || o.type === 'Ouverture') return s + o.montant;
                    if (o.type === 'Sortie') return s - o.montant;
                    return s;
                }, 0);
            } catch(e) {}

            const html = `
                <div class="stats-container">
                    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-content"><div class="stat-title">Produits Total</div><div class="stat-value">${products.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-content"><div class="stat-title">Ventes Aujourd'hui</div><div class="stat-value">${todaySales.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-content"><div class="stat-title">Stock Faible</div><div class="stat-value">${lowStock}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-content"><div class="stat-title">Chiffre d'Affaires</div><div class="stat-value">${formatPrice(totalRevenue)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-content"><div class="stat-title">Total Prix Achat</div><div class="stat-value">${formatPrice(totalPurchase)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-content"><div class="stat-title">Total Prix Vente</div><div class="stat-value">${formatPrice(totalSaleValue)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-content"><div class="stat-title">Total Clients</div><div class="stat-value">${clients.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💵</div><div class="stat-content"><div class="stat-title">Solde Caisse</div><div class="stat-value">${formatPrice(cashBalance)}</div></div></div>
                </div>
                <div class="charts-container">
                    <div class="chart-card"><div class="chart-header"><div class="chart-title">Ventes des 7 derniers jours</div></div><canvas id="salesChart"></canvas></div>
                    <div class="chart-card"><div class="chart-header"><div class="chart-title">Top Produits</div></div><canvas id="topProductsChart"></canvas></div>
                </div>
                <div class="table-container">
                    <div class="table-header"><div class="table-title">Dernières Ventes</div></div>
                    <table><thead><tr><th>ID</th><th>Client</th><th>Date</th><th>Montant</th><th>Statut</th></tr></thead><tbody>
                        ${ventes.slice(0,10).map(v => `<tr><td>#V-${v.id}</td><td>${v.client_name || '-'}</td><td>${new Date(v.date).toLocaleDateString()}</td><td>${formatPrice(v.montant)}</td><td>${v.paye ? '<span class="paid-status">Payée</span>' : '<span class="pending-status">En attente</span>'}</td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            
            // Graphiques
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().slice(0,10);
                const daySales = ventes.filter(v => v.date.slice(0,10) === dateStr);
                last7Days.push({ date: d.toLocaleDateString('fr-FR', {weekday:'short'}), total: daySales.reduce((s,v)=>s+v.montant,0) });
            }
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: last7Days.map(d=>d.date), datasets: [{ label: 'Ventes (FCFA)', data: last7Days.map(d=>d.total), borderColor: '#3498db', tension: 0.4, fill: true }] }
            });
            const topProducts = products.slice(0,5);
            const ctx2 = document.getElementById('topProductsChart').getContext('2d');
            new Chart(ctx2, { type: 'doughnut', data: { labels: topProducts.map(p=>p.nom), datasets: [{ data: topProducts.map(p=>p.quantite), backgroundColor: ['#3498db','#2ecc71','#9b59b6','#f1c40f','#e74c3c'] }] } });
        }

        // Produits
        async function loadProducts(container) {
            const products = await apiCall('/produits');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.showProductModal()"><i class="fas fa-plus"></i> Ajouter Produit</button></div>
                <div class="table-container">
                    <table><thead><tr><th>ID</th><th>Nom</th><th>Catégorie</th><th>Prix Achat</th><th>Prix Vente</th><th>Stock</th><th>Actions</th></tr></thead><tbody>
                        ${products.map(p => `
                            <tr>
                                <td>#P-${p.id}</td><td>${p.nom}</td><td>${p.categorie || '-'}</td><td>${formatPrice(p.prixAchat)}</td><td>${formatPrice(p.prixVente)}</td>
                                <td class="${p.quantite < (p.minStock||10) ? 'low-stock' : ''}">${p.quantite} ${p.unite || 'pce'}</td>
                                <td class="action-buttons"><button class="btn btn-sm btn-primary" onclick="window.editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="window.deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            
            window.showProductModal = () => openProductModal();
            window.editProduct = (id) => openProductModal(id);
            window.deleteProduct = async (id) => {
                if(confirm('Supprimer ce produit ?')) {
                    await apiCall(`/produits/${id}`, 'DELETE');
                    showToast('Produit supprimé');
                    await loadProducts(container);
                }
            };
        }

        async function openProductModal(id=null) {
            let product = { nom: '', prixAchat: 0, prixVente: 0, quantite: 0, minStock: 10, unite: 'Pièce', categorie: '', codeBarre: '', supplier: '', description: '' };
            if(id) product = await apiCall(`/produits/${id}`);
            const modalHtml = `
                <div id="productModal" class="modal" style="display:flex">
                    <div class="modal-content">
                        <div class="modal-header"><div class="modal-title"><i class="fas fa-box"></i> ${id ? 'Modifier' : 'Ajouter'} Produit</div><button class="modal-close" onclick="closeModal('productModal')">&times;</button></div>
                        <div class="modal-body">
                            <div class="form-grid">
                                <div class="form-group"><label>Nom *</label><input id="prod_nom" class="form-control" value="${product.nom}"></div>
                                <div class="form-group"><label>Catégorie</label><input id="prod_categorie" class="form-control" value="${product.categorie || ''}"></div>
                                <div class="form-group"><label>Prix Achat</label><input id="prod_prixAchat" type="number" class="form-control" value="${product.prixAchat || 0}"></div>
                                <div class="form-group"><label>Prix Vente *</label><input id="prod_prixVente" type="number" class="form-control" value="${product.prixVente || 0}"></div>
                                <div class="form-group"><label>Stock</label><input id="prod_quantite" type="number" class="form-control" value="${product.quantite || 0}"></div>
                                <div class="form-group"><label>Stock Minimum</label><input id="prod_minStock" type="number" class="form-control" value="${product.minStock || 10}"></div>
                                <div class="form-group"><label>Code Barre</label><input id="prod_codeBarre" class="form-control" value="${product.codeBarre || ''}"></div>
                                <div class="form-group"><label>Fournisseur</label><input id="prod_supplier" class="form-control" value="${product.supplier || ''}"></div>
                                <div class="form-group"><label>Unité</label><input id="prod_unite" class="form-control" value="${product.unite || 'Pièce'}"></div>
                            </div>
                            <div class="form-group"><label>Description</label><textarea id="prod_description" class="form-control" rows="2">${product.description || ''}</textarea></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('productModal')">Annuler</button><button class="btn btn-primary" onclick="window.saveProduct(${id})">Enregistrer</button></div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.saveProduct = async (id) => {
            const data = {
                nom: document.getElementById('prod_nom').value,
                categorie: document.getElementById('prod_categorie').value,
                prixAchat: parseFloat(document.getElementById('prod_prixAchat').value) || 0,
                prixVente: parseFloat(document.getElementById('prod_prixVente').value) || 0,
                quantite: parseInt(document.getElementById('prod_quantite').value) || 0,
                minStock: parseInt(document.getElementById('prod_minStock').value) || 10,
                codeBarre: document.getElementById('prod_codeBarre').value,
                supplier: document.getElementById('prod_supplier').value,
                unite: document.getElementById('prod_unite').value,
                description: document.getElementById('prod_description').value
            };
            if(id) await apiCall(`/produits/${id}`, 'PUT', data);
            else await apiCall('/produits', 'POST', data);
            closeModal('productModal');
            showToast('Produit enregistré');
            await loadProducts(document.getElementById('page-content'));
        };

        // Clients
        async function loadClients(container) {
            const clients = await apiCall('/clients');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.showClientModal()"><i class="fas fa-plus"></i> Ajouter Client</button></div>
                <div class="table-container">
                    <table><thead><tr><th>ID</th><th>Nom</th><th>Téléphone</th><th>Email</th><th>Crédit</th><th>Actions</th></tr></thead><tbody>
                        ${clients.map(c => `
                            <tr><td>#C-${c.id}</td><td>${c.nom}</td><td>${c.telephone}</td><td>${c.email || '-'}</td><td>${formatPrice(c.creditLimit || 0)}</td>
                            <td class="action-buttons"><button class="btn btn-sm btn-primary" onclick="window.editClient(${c.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="window.deleteClient(${c.id})"><i class="fas fa-trash"></i></button></td></tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.showClientModal = () => openClientModal();
            window.editClient = (id) => openClientModal(id);
            window.deleteClient = async (id) => {
                if(confirm('Supprimer ce client ?')) {
                    await apiCall(`/clients/${id}`, 'DELETE');
                    showToast('Client supprimé');
                    await loadClients(container);
                }
            };
        }

        async function openClientModal(id=null) {
            let client = { nom: '', telephone: '', email: '', adresse: '', creditLimit: 0, type: 'particulier', notes: '' };
            if(id) client = await apiCall(`/clients/${id}`);
            const modalHtml = `
                <div id="clientModal" class="modal" style="display:flex">
                    <div class="modal-content">
                        <div class="modal-header"><div class="modal-title"><i class="fas fa-user"></i> ${id ? 'Modifier' : 'Ajouter'} Client</div><button class="modal-close" onclick="closeModal('clientModal')">&times;</button></div>
                        <div class="modal-body">
                            <div class="form-grid">
                                <div class="form-group"><label>Nom *</label><input id="cli_nom" class="form-control" value="${client.nom}"></div>
                                <div class="form-group"><label>Téléphone *</label><input id="cli_telephone" class="form-control" value="${client.telephone}"></div>
                                <div class="form-group"><label>Email</label><input id="cli_email" class="form-control" value="${client.email || ''}"></div>
                                <div class="form-group"><label>Adresse</label><input id="cli_adresse" class="form-control" value="${client.adresse || ''}"></div>
                                <div class="form-group"><label>Limite Crédit</label><input id="cli_creditLimit" type="number" class="form-control" value="${client.creditLimit || 0}"></div>
                                <div class="form-group"><label>Type</label><select id="cli_type" class="form-control"><option ${client.type==='particulier'?'selected':''}>particulier</option><option ${client.type==='professionnel'?'selected':''}>professionnel</option><option ${client.type==='entreprise'?'selected':''}>entreprise</option></select></div>
                            </div>
                            <div class="form-group"><label>Notes</label><textarea id="cli_notes" class="form-control">${client.notes || ''}</textarea></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('clientModal')">Annuler</button><button class="btn btn-primary" onclick="window.saveClient(${id})">Enregistrer</button></div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.saveClient = async (id) => {
            const data = {
                nom: document.getElementById('cli_nom').value,
                telephone: document.getElementById('cli_telephone').value,
                email: document.getElementById('cli_email').value,
                adresse: document.getElementById('cli_adresse').value,
                creditLimit: parseFloat(document.getElementById('cli_creditLimit').value) || 0,
                type: document.getElementById('cli_type').value,
                notes: document.getElementById('cli_notes').value
            };
            if(id) await apiCall(`/clients/${id}`, 'PUT', data);
            else await apiCall('/clients', 'POST', data);
            closeModal('clientModal');
            showToast('Client enregistré');
            await loadClients(document.getElementById('page-content'));
        };

        // Ventes
        async function loadSales(container) {
            const ventes = await apiCall('/ventes');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.showSaleSystem()"><i class="fas fa-plus"></i> Nouvelle Vente</button></div>
                <div class="table-container">
                    <table><thead><tr><th>ID</th><th>Date</th><th>Client</th><th>Montant</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
                        ${ventes.map(v => `
                            <tr><td>#V-${v.id}</td><td>${new Date(v.date).toLocaleDateString()}</td><td>${v.client_name || '-'}</td><td>${formatPrice(v.montant)}</td>
                            <td>${v.paye ? '<span class="paid-status">Payée</span>' : '<span class="pending-status">En attente</span>'}</td>
                            <td><button class="btn btn-sm btn-info" onclick="window.viewInvoice(${v.id})"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="window.deleteSale(${v.id})"><i class="fas fa-trash"></i></button></td></tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.showSaleSystem = () => showSaleSystem(container);
            window.viewInvoice = (id) => generateInvoice(id);
            window.deleteSale = async (id) => {
                if(confirm('Supprimer cette vente ?')) {
                    await apiCall(`/ventes/${id}`, 'DELETE');
                    showToast('Vente supprimée');
                    await loadSales(container);
                }
            };
        }

        async function showSaleSystem(container) {
            const products = await apiCall('/produits');
            let cart = [];
            let currentDiscount = 0;
            
            const render = () => {
                let subtotal = cart.reduce((s,item)=>s + item.price*item.quantity,0);
                let total = subtotal - currentDiscount;
                container.innerHTML = `
                    <div class="sale-container">
                        <div><div class="search-container"><i class="fas fa-search"></i><input type="text" id="productSearch" class="form-control" placeholder="Rechercher un produit..."></div>
                        <div class="products-grid" id="productsGrid">${products.map(p => `
                            <div class="product-card" data-id="${p.id}"><div class="product-image"><i class="fas fa-box"></i></div>
                            <div class="product-info"><div class="product-name">${p.nom}</div><div class="product-price">${formatPrice(p.prixVente)}</div>
                            <div class="product-stock">Stock: ${p.quantite}</div></div></div>
                        `).join('')}</div></div>
                        <div class="cart-container"><div class="cart-header">Panier</div>
                        <div class="cart-items" id="cartItems">${cart.map((item,i) => `
                            <div class="cart-item"><div>${item.name}</div><div><button class="qty-btn" onclick="window.changeQty(${i},-1)">-</button> ${item.quantity} <button class="qty-btn" onclick="window.changeQty(${i},1)">+</button></div>
                            <div>${formatPrice(item.price*item.quantity)}</div><button class="btn btn-sm btn-danger" onclick="window.removeItem(${i})"><i class="fas fa-trash"></i></button></div>
                        `).join('')}</div>
                        <div class="cart-summary"><div class="summary-row"><span>Sous-total:</span><span>${formatPrice(subtotal)}</span></div>
                        <div class="summary-row"><span>Remise:</span><span>${formatPrice(currentDiscount)}</span></div>
                        <div class="total-row"><span>TOTAL:</span><span>${formatPrice(total)}</span></div></div>
                        <div class="form-group"><label>Client</label><input id="clientName" class="form-control" placeholder="Nom du client"></div>
                        <div class="form-group"><label>Mode paiement</label><select id="paymentMethod" class="form-control"><option value="cash">Espèces</option><option value="card">Carte</option><option value="credit">Crédit</option></select></div>
                        <button class="btn btn-success" onclick="window.completeSale()">Finaliser la Vente</button></div>
                    </div>
                `;
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = parseInt(card.dataset.id);
                        const prod = products.find(p=>p.id===id);
                        if(prod && prod.quantite>0) {
                            const existing = cart.find(i=>i.id===id);
                            if(existing) existing.quantity++;
                            else cart.push({id, name: prod.nom, price: prod.prixVente, quantity: 1});
                            render();
                        } else showToast('Stock insuffisant','error');
                    });
                });
                document.getElementById('productSearch').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = products.filter(p=>p.nom.toLowerCase().includes(term));
                    const grid = document.getElementById('productsGrid');
                    grid.innerHTML = filtered.map(p => `<div class="product-card" data-id="${p.id}"><div class="product-image"><i class="fas fa-box"></i></div><div class="product-info"><div class="product-name">${p.nom}</div><div class="product-price">${formatPrice(p.prixVente)}</div><div class="product-stock">Stock: ${p.quantite}</div></div></div>`).join('');
                    document.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', () => { /* même logique */ });
                    });
                });
            };
            window.changeQty = (idx, delta) => {
                if(cart[idx].quantity + delta > 0) cart[idx].quantity += delta;
                else cart.splice(idx,1);
                render();
            };
            window.removeItem = (idx) => { cart.splice(idx,1); render(); };
            window.completeSale = async () => {
                if(cart.length===0) { showToast('Panier vide','error'); return; }
                const total = cart.reduce((s,i)=>s + i.price*i.quantity,0) - currentDiscount;
                const saleData = {
                    client_name: document.getElementById('clientName').value || 'Client non spécifié',
                    montant: total,
                    discount: currentDiscount,
                    payment_method: document.getElementById('paymentMethod').value,
                    details: cart.map(i => ({ produit_id: i.id, designation: i.name, quantite: i.quantity, prix_unitaire: i.price }))
                };
                await apiCall('/ventes', 'POST', saleData);
                showToast('Vente enregistrée');
                cart = [];
                currentDiscount = 0;
                await loadSales(container);
            };
            render();
        }

        // Factures
        async function loadInvoices(container) {
            const factures = await apiCall('/factures');
            const html = `
                <div class="table-container">
                    <table><thead><tr><th>N° Facture</th><th>Date</th><th>Client</th><th>Montant</th><th>Payé</th><th>Reste</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
                        ${factures.map(f => {
                            const reste = f.montant - (f.amount_paid||0);
                            return `<tr><td>FACT-${f.id}</td><td>${new Date(f.date).toLocaleDateString()}</td><td>${f.client_nom || f.client_name || '-'}</td>
                            <td>${formatPrice(f.montant)}</td><td>${formatPrice(f.amount_paid||0)}</td><td>${formatPrice(reste)}</td>
                            <td>${f.paye ? '<span class="paid-status">Payée</span>' : '<span class="pending-status">En attente</span>'}</td>
                            <td><button class="btn btn-sm btn-primary" onclick="window.viewInvoice(${f.id})"><i class="fas fa-eye"></i></button>
                            ${!f.paye ? `<button class="btn btn-sm btn-success" onclick="window.recordPayment(${f.id}, ${reste})"><i class="fas fa-money-bill"></i></button>` : ''}</td></tr>`;
                        }).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.viewInvoice = (id) => generateInvoice(id);
            window.recordPayment = (id, due) => openPaymentModal(id, due);
        }

        async function generateInvoice(saleId) {
            const sale = await apiCall(`/ventes/${saleId}`);
            const html = `
                <div id="invoiceModal" class="modal" style="display:flex">
                    <div class="modal-content" style="max-width:800px">
                        <div class="modal-header"><div class="modal-title">Facture #${sale.id}</div><button class="modal-close" onclick="closeModal('invoiceModal')">&times;</button></div>
                        <div class="modal-body">
                            <div class="invoice-container">
                                <div class="invoice-header"><h2>FACTURE</h2><p>Date: ${new Date(sale.date).toLocaleDateString()}</p></div>
                                <div><strong>Client:</strong> ${sale.client_name || '-'}</div>
                                <table class="invoice-table"><thead><tr><th>Désignation</th><th>Qté</th><th>Prix U.</th><th>Total</th></tr></thead><tbody>
                                    ${sale.details.map(d => `<tr><td>${d.designation || 'Produit'}</td><td>${d.quantite}</td><td>${formatPrice(d.prix_unitaire)}</td><td>${formatPrice(d.quantite*d.prix_unitaire)}</td></tr>`).join('')}
                                </tbody></table>
                                <div class="invoice-totals"><div>Total: ${formatPrice(sale.montant)}</div></div>
                                <button class="btn btn-primary print-invoice-btn" onclick="window.printInvoice(${sale.id})">Imprimer PDF</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        window.printInvoice = async (id) => {
            const sale = await apiCall(`/ventes/${id}`);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Facture #${sale.id}`, 20, 20);
            doc.text(`Date: ${new Date(sale.date).toLocaleDateString()}`, 20, 30);
            doc.text(`Client: ${sale.client_name || '-'}`, 20, 40);
            let y = 50;
            sale.details.forEach(d => {
                doc.text(`${d.designation || 'Produit'} - ${d.quantite} x ${d.prix_unitaire} = ${d.quantite*d.prix_unitaire}`, 20, y);
                y+=10;
            });
            doc.text(`Total: ${sale.montant} FCFA`, 20, y+10);
            doc.save(`facture_${sale.id}.pdf`);
            showToast('PDF généré');
        };

        async function openPaymentModal(invoiceId, due) {
            const modalHtml = `
                <div id="paymentModal" class="modal" style="display:flex">
                    <div class="modal-content"><div class="modal-header"><div class="modal-title">Enregistrer Paiement</div><button class="modal-close" onclick="closeModal('paymentModal')">&times;</button></div>
                    <div class="modal-body"><div class="form-group"><label>Montant dû</label><input id="dueAmount" class="form-control" value="${due}" readonly></div>
                    <div class="form-group"><label>Montant à payer</label><input id="payAmount" type="number" class="form-control" value="${due}"></div>
                    <div class="form-group"><label>Mode</label><select id="payMethod" class="form-control"><option value="cash">Espèces</option><option value="card">Carte</option></select></div>
                    <div class="form-group"><label>Date</label><input id="payDate" type="date" class="form-control" value="${new Date().toISOString().slice(0,10)}"></div></div>
                    <div class="modal-footer"><button class="btn btn-primary" onclick="window.submitPayment(${invoiceId})">Enregistrer</button></div></div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.submitPayment = async (invoiceId) => {
            const montant = parseFloat(document.getElementById('payAmount').value);
            const method = document.getElementById('payMethod').value;
            const date = document.getElementById('payDate').value;
            await apiCall('/paiements', 'POST', { facture_id: invoiceId, montant, date, method });
            closeModal('paymentModal');
            showToast('Paiement enregistré');
            await loadInvoices(document.getElementById('page-content'));
        };

        // Caisse
        async function loadCashier(container) {
            const ops = await apiCall('/caisse');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.addCashOperation()"><i class="fas fa-plus"></i> Nouvelle Opération</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Date</th><th>Type</th><th>Montant</th><th>Description</th><th>Responsable</th></tr></thead><tbody>
                        ${ops.map(o => `<tr><td>${new Date(o.date).toLocaleString()}</td><td><span class="badge ${o.type==='Entrée'?'badge-success':'badge-danger'}">${o.type}</span></td><td>${formatPrice(o.montant)}</td><td>${o.description || ''}</td><td>${o.responsable || ''}</td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.addCashOperation = () => {
                const type = prompt('Type (Entrée/Sortie)');
                const montant = parseFloat(prompt('Montant'));
                const description = prompt('Description');
                if(type && montant) apiCall('/caisse', 'POST', { type, montant, description }).then(()=>loadCashier(container));
            };
        }

        // Inventaire
        async function loadInventory(container) {
            const inventaires = await apiCall('/inventaires');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.startInventory()"><i class="fas fa-clipboard-list"></i> Démarrer Inventaire</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Date</th><th>Produits</th><th>Théorique</th><th>Compté</th><th>Écart</th></tr></thead><tbody>
                        ${inventaires.map(i => `<tr><td>${new Date(i.date).toLocaleDateString()}</td><td>${JSON.parse(i.products).length}</td><td>${i.theoreticalTotal}</td><td>${i.actualTotal}</td><td class="${i.difference<0?'text-danger':'text-success'}">${i.difference}</td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.startInventory = async () => {
                const products = await apiCall('/produits');
                let items = products.map(p => ({ productId: p.id, theoretical: p.quantite, counted: p.quantite }));
                let htmlInv = `<div id="inventoryModal" class="modal" style="display:flex"><div class="modal-content"><div class="modal-header"><div class="modal-title">Inventaire en cours</div><button class="modal-close" onclick="closeModal('inventoryModal')">&times;</button></div>
                <div class="modal-body"><div class="inventory-grid">`;
                items.forEach(item => {
                    const prod = products.find(p=>p.id===item.productId);
                    htmlInv += `<div><strong>${prod.nom}</strong><br>Théorique: ${item.theoretical}<br><input type="number" id="count_${item.productId}" value="${item.counted}" placeholder="Compté"></div>`;
                });
                htmlInv += `</div></div><div class="modal-footer"><button class="btn btn-primary" onclick="window.saveInventory(${JSON.stringify(items).replace(/"/g, '&quot;')})">Enregistrer</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', htmlInv);
            };
            window.saveInventory = async (items) => {
                const products = await apiCall('/produits');
                let theoreticalTotal=0, actualTotal=0;
                for(let item of items) {
                    const counted = parseInt(document.getElementById(`count_${item.productId}`).value) || 0;
                    item.counted = counted;
                    theoreticalTotal += item.theoretical;
                    actualTotal += counted;
                }
                const difference = actualTotal - theoreticalTotal;
                await apiCall('/inventaires', 'POST', { date: new Date().toISOString(), products: items, theoreticalTotal, actualTotal, difference });
                closeModal('inventoryModal');
                showToast('Inventaire enregistré');
                await loadInventory(document.getElementById('page-content'));
            };
        }

        // Rapports
        async function loadReports(container) {
            const ventes = await apiCall('/ventes');
            const monthly = Array(12).fill(0);
            ventes.forEach(v => {
                const m = new Date(v.date).getMonth();
                monthly[m] += v.montant;
            });
            container.innerHTML = `
                <div class="chart-card"><canvas id="monthlyChart"></canvas></div>
                <div class="table-container"><h3>Top Clients</h3><table><thead><tr><th>Client</th><th>Total Achats</th></tr></thead><tbody>
                    ${Object.entries(ventes.reduce((acc,v)=>{if(v.client_name) acc[v.client_name]=(acc[v.client_name]||0)+v.montant; return acc;},{}))
                        .sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,total])=>`<tr><td>${name}</td><td>${formatPrice(total)}</td></tr>`).join('')}
                </tbody></table></div>
            `;
            new Chart(document.getElementById('monthlyChart'), { type: 'bar', data: { labels: ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'], datasets: [{ label: 'Ventes mensuelles', data: monthly, backgroundColor: '#3498db' }] } });
        }

        // Utilisateurs (admin only)
        async function loadUsers(container) {
            if(currentUser.role !== 'admin') {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-ban"></i><p>Accès réservé aux administrateurs</p></div>';
                return;
            }
            const users = await apiCall('/users');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.showUserModal()"><i class="fas fa-plus"></i> Ajouter Utilisateur</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Nom</th><th>Username</th><th>Rôle</th><th>Email</th><th>Actions</th></tr></thead><tbody>
                        ${users.map(u => `<tr><td>${u.fullName}</td><td>${u.username}</td><td>${u.role}</td><td>${u.email || '-'}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="window.deleteUser(${u.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.showUserModal = () => openUserModal();
            window.deleteUser = async (id) => {
                if(confirm('Supprimer cet utilisateur ?')) {
                    await apiCall(`/users/${id}`, 'DELETE');
                    showToast('Utilisateur supprimé');
                    await loadUsers(container);
                }
            };
        }

        async function openUserModal() {
            const modalHtml = `
                <div id="userModal" class="modal" style="display:flex">
                    <div class="modal-content"><div class="modal-header"><div class="modal-title">Ajouter Utilisateur</div><button class="modal-close" onclick="closeModal('userModal')">&times;</button></div>
                    <div class="modal-body"><div class="form-group"><label>Nom complet</label><input id="user_fullName" class="form-control"></div>
                    <div class="form-group"><label>Nom d'utilisateur</label><input id="user_username" class="form-control"></div>
                    <div class="form-group"><label>Mot de passe</label><input id="user_password" type="password" class="form-control"></div>
                    <div class="form-group"><label>Email</label><input id="user_email" class="form-control"></div>
                    <div class="form-group"><label>Rôle</label><select id="user_role" class="form-control"><option>vendeur</option><option>caissier</option><option>gestionnaire</option><option>admin</option></select></div></div>
                    <div class="modal-footer"><button class="btn btn-primary" onclick="window.saveUser()">Enregistrer</button></div></div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.saveUser = async () => {
            const data = {
                fullName: document.getElementById('user_fullName').value,
                username: document.getElementById('user_username').value,
                password: document.getElementById('user_password').value,
                email: document.getElementById('user_email').value,
                role: document.getElementById('user_role').value
            };
            await apiCall('/users', 'POST', data);
            closeModal('userModal');
            showToast('Utilisateur créé');
            await loadUsers(document.getElementById('page-content'));
        };

        // Paramètres
        async function loadSettings(container) {
            const settings = await apiCall('/settings/store');
            const html = `
                <div class="form-container">
                    <h3>Paramètres du magasin</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Nom</label><input id="store_nom" class="form-control" value="${settings.nom || ''}"></div>
                        <div class="form-group"><label>Téléphone</label><input id="store_telephone" class="form-control" value="${settings.telephone || ''}"></div>
                        <div class="form-group"><label>Email</label><input id="store_email" class="form-control" value="${settings.email || ''}"></div>
                        <div class="form-group"><label>Adresse</label><input id="store_adresse" class="form-control" value="${settings.adresse || ''}"></div>
                        <div class="form-group"><label>Devise</label><input id="store_currency" class="form-control" value="${settings.currency || 'FCFA'}"></div>
                    </div>
                    <button class="btn btn-primary" onclick="window.saveSettings()">Enregistrer</button>
                </div>
            `;
            container.innerHTML = html;
            window.saveSettings = async () => {
                const data = {
                    nom: document.getElementById('store_nom').value,
                    telephone: document.getElementById('store_telephone').value,
                    email: document.getElementById('store_email').value,
                    adresse: document.getElementById('store_adresse').value,
                    currency: document.getElementById('store_currency').value,
                    language: 'fr'
                };
                await apiCall('/settings/store', 'POST', data);
                showToast('Paramètres enregistrés');
            };
        }

        // Initialisation de l'application
        async function init() {
            const storedToken = localStorage.getItem('token');
            const storedUser = localStorage.getItem('user');
            if(storedToken && storedUser) {
                token = storedToken;
                currentUser = JSON.parse(storedUser);
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('user-name').textContent = currentUser.fullName;
                document.getElementById('user-role').textContent = currentUser.role === 'admin' ? 'Administrateur' : currentUser.role;
                document.getElementById('user-avatar').textContent = currentUser.fullName.charAt(0).toUpperCase();
                await showPage('dashboard');
            } else {
                document.getElementById('login-page').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        }

        // Connexion
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('user-name').textContent = currentUser.fullName;
                document.getElementById('user-role').textContent = currentUser.role === 'admin' ? 'Administrateur' : currentUser.role;
                document.getElementById('user-avatar').textContent = currentUser.fullName.charAt(0).toUpperCase();
                await showPage('dashboard');
            } catch(err) {
                showToast(err.message, 'error');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        });

        // Navigation sidebar
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const page = item.getAttribute('data-page');
                showPage(page);
            });
        });

        // Menu hamburger
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('show');
        });

        init();
    </script>
</body>
</html>
