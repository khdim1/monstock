<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion - Gestion de Stock</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        input, button { padding: 10px; margin: 5px; }
        pre { background: #f4f4f4; padding: 10px; margin-top: 20px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Test de connexion API</h1>
    <input type="text" id="username" placeholder="Nom d'utilisateur" value="matar">
    <input type="password" id="password" placeholder="Mot de passe" value="matar123">
    <button onclick="login()">Se connecter</button>
    <div id="result"></div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Connexion en cours...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    resultDiv.innerHTML = `<div class="error">Erreur ${response.status} : ${JSON.stringify(data)}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="success">Succès ! Token : ${data.token.substring(0, 50)}...<br>Utilisateur : ${data.user.username} (rôle: ${data.user.role})</div>`;
                    // Vous pouvez décommenter pour rediriger vers l'application complète après succès
                    // localStorage.setItem('token', data.token);
                    // localStorage.setItem('user', JSON.stringify(data.user));
                    // window.location.href = '/app.html';
                }
            } catch(err) {
                resultDiv.innerHTML = `<div class="error">Erreur réseau : ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
