<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion de Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ========== STYLES COMPLETS (identiques à l'original) ========== */
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border: #dee2e6;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --sidebar-width: 250px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Roboto', sans-serif; }
        body { background-color: #f5f7fa; color: #333; line-height: 1.6; overflow-x: hidden; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, var(--primary) 0%, #1a252f 100%); color: white; transition: var(--transition); height: 100vh; position: fixed; overflow-y: auto; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .logo-container { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; background: rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; }
        .logo i { color: var(--success); font-size: 28px; }
        .nav-links { padding: 20px 0; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: var(--transition); border-left: 4px solid transparent; margin: 5px 10px; border-radius: 8px; }
        .nav-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item.active { background: var(--secondary); border-left: 4px solid var(--success); box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3); }
        .nav-item i { width: 24px; text-align: center; font-size: 18px; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 20px; background: #f5f7fa; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 25px; background: white; border-radius: 10px; box-shadow: var(--card-shadow); position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 24px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--secondary), var(--success)); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .logout-btn { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); font-weight: 600; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(231, 76, 60, 0.3); }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 20px; transition: var(--transition); border: 1px solid transparent; }
        .stat-card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); border-color: var(--secondary); }
        .stat-icon { width: 70px; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .stat-content { flex: 1; }
        .stat-title { color: var(--gray); font-size: 14px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); }
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 30px; }
        @media (max-width: 1200px) { .charts-container { grid-template-columns: 1fr; } }
        .chart-card { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .chart-title { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: var(--transition); font-size: 14px; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-primary { background: linear-gradient(135deg, var(--secondary), #2980b9); color: white; }
        .btn-success { background: linear-gradient(135deg, var(--success), #27ae60); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d68910); color: white; }
        .btn-info { background: linear-gradient(135deg, var(--info), #138496); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .table-container { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); overflow-x: auto; border: 1px solid var(--border); }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-title { font-size: 18px; font-weight: 700; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { padding: 15px 12px; text-align: left; background: linear-gradient(180deg, var(--light), #e9ecef); font-weight: 700; color: var(--dark); border-bottom: 2px solid var(--secondary); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        td { padding: 15px 12px; border-bottom: 1px solid var(--light-gray); }
        tr:hover { background: rgba(52, 152, 219, 0.05); }
        .form-container { background: white; border-radius: 15px; padding: 30px; box-shadow: var(--card-shadow); margin-bottom: 30px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--dark); font-size: 14px; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; transition: var(--transition); background: white; }
        .form-control:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 15px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: modalSlideIn 0.3s ease-out; }
        @keyframes modalSlideIn { from { opacity: 0; transform: translateY(-30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .modal-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, var(--light), white); border-radius: 15px 15px 0 0; }
        .modal-title { font-size: 22px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--gray); transition: var(--transition); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--light-gray); color: var(--danger); }
        .modal-body { padding: 25px; }
        .modal-footer { padding: 20px 25px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 15px; background: var(--light); border-radius: 0 0 15px 15px; }
        @media (max-width: 992px) { .sidebar { width: 80px; transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .logo span, .nav-item span { display: none; } .logo { justify-content: center; } .main-content { margin-left: 0; } }
        .page-section { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .page-section.active { display: block; }
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 10px; color: white; font-weight: 600; z-index: 3000; transform: translateX(150%); transition: transform 0.4s ease; display: flex; align-items: center; gap: 12px; max-width: 350px; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, var(--success), #27ae60); }
        .toast.error { background: linear-gradient(135deg, var(--danger), #c0392b); }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-form { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        .login-logo { text-align: center; margin-bottom: 35px; }
        .login-logo i { font-size: 60px; color: var(--secondary); margin-bottom: 15px; }
        .login-logo h1 { margin-top: 15px; font-size: 28px; color: var(--primary); font-weight: 800; }
        .login-footer { text-align: center; margin-top: 25px; color: var(--gray); font-size: 14px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-success { background: var(--success); color: white; }
        .badge-danger { background: var(--danger); color: white; }
        .badge-warning { background: var(--warning); color: white; }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--gray); }
        .empty-state i { font-size: 60px; margin-bottom: 20px; }
        .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 1001; background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 10px; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        @media (max-width: 992px) { .menu-toggle { display: flex; } }
        .low-stock { color: var(--danger); font-weight: bold; }
        .pending-status, .paid-status, .overdue-status { display: inline-block; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .pending-status { background: rgba(243,156,18,0.1); color: var(--warning); }
        .paid-status { background: rgba(46,204,113,0.1); color: var(--success); }
        .overdue-status { background: rgba(231,76,60,0.1); color: var(--danger); }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--secondary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 30px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Ajoutez les autres styles nécessaires (invoice, cart, etc.) - gardés identiques à l'original */
        .invoice-container { background: white; border-radius: 15px; padding: 40px; box-shadow: var(--card-shadow); max-width: 1000px; margin: 20px auto; }
        .invoice-header { text-align: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 3px solid var(--primary); }
        .invoice-title { font-size: 36px; font-weight: 800; color: var(--primary); }
        .invoice-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .invoice-client, .invoice-details { background: var(--light); padding: 20px; border-radius: 10px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
        .invoice-table th { background: var(--primary); color: white; padding: 12px; }
        .invoice-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .invoice-totals { margin-left: auto; width: 350px; background: var(--light); padding: 20px; border-radius: 10px; }
        .print-invoice-btn { background: var(--success); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin-top: 30px; display: block; margin-left: auto; margin-right: auto; }
        .sale-container { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
        @media (max-width: 1200px) { .sale-container { grid-template-columns: 1fr; } }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow); transition: var(--transition); cursor: pointer; border: 2px solid transparent; }
        .product-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--secondary); }
        .product-image { height: 150px; background: var(--light); display: flex; align-items: center; justify-content: center; font-size: 50px; color: var(--gray); }
        .product-info { padding: 20px; }
        .product-name { font-weight: 700; margin-bottom: 8px; }
        .product-price { color: var(--success); font-weight: 800; font-size: 18px; }
        .product-stock { font-size: 14px; color: var(--gray); margin-top: 8px; }
        .cart-container { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); position: sticky; top: 100px; }
        .cart-header { font-size: 22px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--secondary); }
        .cart-items { max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: grid; grid-template-columns: auto 1fr auto auto; gap: 15px; align-items: center; padding: 15px; background: var(--light); border-radius: 8px; margin-bottom: 10px; }
        .cart-summary { border-top: 2px solid var(--border); padding-top: 25px; margin-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .total-row { font-size: 20px; font-weight: 800; padding: 15px 0; border-top: 2px solid var(--border); margin-top: 15px; color: var(--primary); }
        .quantity-controls { display: flex; align-items: center; gap: 5px; }
        .quantity-input { width: 60px; text-align: center; padding: 5px; border: 1px solid var(--border); border-radius: 4px; }
        .quantity-btn { width: 30px; height: 30px; border-radius: 4px; border: 1px solid var(--border); background: white; cursor: pointer; }
        .quantity-btn:hover { background: var(--secondary); color: white; }
        .price-input { width: 100px; padding: 5px; border: 1px solid var(--border); border-radius: 4px; }
        .quick-sale-container { border: 2px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 25px; background: white; }
        .quick-sale-search-container { position: relative; margin-bottom: 15px; }
        .quick-sale-search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray); }
        .quick-sale-search-container input { padding-left: 50px; height: 55px; border-radius: 10px; border: 2px solid var(--border); width: 100%; }
        .quick-sale-results { display: none; max-height: 300px; overflow-y: auto; border: 2px solid var(--border); border-radius: 10px; background: white; position: absolute; width: 100%; z-index: 100; }
        .quick-product-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--light-gray); cursor: pointer; gap: 15px; }
        .quick-product-item:hover { background: rgba(52,152,219,0.1); }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .inventory-item { background: white; border-radius: 12px; padding: 20px; box-shadow: var(--card-shadow); }
        .inventory-quantities { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .inventory-quantity { text-align: center; padding: 10px; border-radius: 8px; font-weight: 600; }
        .inventory-theoretical { background: rgba(52,152,219,0.1); color: var(--secondary); }
        .inventory-counted { background: rgba(46,204,113,0.1); color: var(--success); }
        .inventory-difference { background: rgba(231,76,60,0.1); color: var(--danger); }
        .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 25px; overflow-x: auto; }
        .tab { padding: 15px 25px; cursor: pointer; background: none; border: none; font-weight: 600; color: var(--gray); white-space: nowrap; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--secondary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <div id="login-page" class="login-container">
        <div class="login-form">
            <div class="login-logo"><i class="fas fa-store"></i><h1>Gestion de Stock</h1><p>Système complet de gestion d'inventaire</p></div>
            <div class="form-group"><label class="form-label">Nom d'utilisateur</label><input type="text" class="form-control" id="login-username" placeholder="admin"></div>
            <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-control" id="login-password" placeholder="admin"></div>
            <button class="btn btn-primary" id="login-btn" style="width:100%"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
            <div class="login-footer">© Système de Gestion de Stock - Version 3.0</div>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <div class="sidebar" id="sidebar">
            <div class="logo-container"><div class="logo"><i class="fas fa-store"></i><span>GESTION STOCK</span></div></div>
            <div class="nav-links">
                <div class="nav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>Tableau de Bord</span></div>
                <div class="nav-item" data-page="products"><i class="fas fa-boxes"></i><span>Produits</span></div>
                <div class="nav-item" data-page="clients"><i class="fas fa-users"></i><span>Clients</span></div>
                <div class="nav-item" data-page="sales"><i class="fas fa-shopping-cart"></i><span>Ventes</span></div>
                <div class="nav-item" data-page="invoices"><i class="fas fa-file-invoice-dollar"></i><span>Factures</span></div>
                <div class="nav-item" data-page="cashier"><i class="fas fa-cash-register"></i><span>Caisse</span></div>
                <div class="nav-item" data-page="inventory"><i class="fas fa-clipboard-list"></i><span>Inventaire</span></div>
                <div class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i><span>Rapports</span></div>
                <div class="nav-item" data-page="users"><i class="fas fa-user-cog"></i><span>Utilisateurs</span></div>
                <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span>Paramètres</span></div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="header-title"><i class="fas fa-tachometer-alt"></i><span id="page-title">Tableau de Bord</span></div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div><div class="user-name" id="user-name">Administrateur</div><div class="user-role" id="user-role">Administrateur</div></div>
                    <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                </div>
            </div>
            <div id="page-content"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ==================== CONFIGURATION API ====================
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let currentUser = null;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Erreur serveur');
            }
            return response.json();
        }

        function formatPrice(number) {
            const num = typeof number === 'string' ? parseFloat(number) : number;
            if (isNaN(num)) return "0,00 FCFA";
            return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " FCFA";
        }

        function formatNumber(number) {
            const num = typeof number === 'string' ? parseFloat(number) : number;
            if (isNaN(num)) return "0";
            return num.toLocaleString('fr-FR');
        }

        // Fermeture modale générique
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none';
        }

        // ==================== NAVIGATION ====================
        async function loadPage(page) {
            const titles = {
                'dashboard': 'Tableau de Bord',
                'products': 'Gestion des Produits',
                'clients': 'Gestion des Clients',
                'sales': 'Historique des Ventes',
                'invoices': 'Gestion des Factures',
                'cashier': 'Gestion de Caisse',
                'inventory': 'Gestion des Inventaires',
                'reports': 'Rapports et Statistiques',
                'users': 'Gestion des Utilisateurs',
                'settings': 'Paramètres du Système'
            };
            document.getElementById('page-title').innerText = titles[page] || page;
            const contentDiv = document.getElementById('page-content');
            contentDiv.innerHTML = '<div class="loader" style="display:block; text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin fa-3x"></i></div>';
            try {
                if (page === 'dashboard') await loadDashboard(contentDiv);
                else if (page === 'products') await loadProducts(contentDiv);
                else if (page === 'clients') await loadClients(contentDiv);
                else if (page === 'sales') await loadSales(contentDiv);
                else if (page === 'invoices') await loadInvoices(contentDiv);
                else if (page === 'cashier') await loadCashier(contentDiv);
                else if (page === 'inventory') await loadInventory(contentDiv);
                else if (page === 'reports') await loadReports(contentDiv);
                else if (page === 'users') await loadUsers(contentDiv);

        async function loadDashboard(container) {
            const [products, clients, ventes] = await Promise.all([
                apiCall('/produits'),
                apiCall('/clients'),
                apiCall('/ventes')
            ]);
            const today = new Date().toISOString().slice(0,10);
            const todaySales = ventes.filter(v => v.date.slice(0,10) === today);
            const totalRevenue = ventes.reduce((s,v) => s + v.montant, 0);
            const lowStock = products.filter(p => p.quantite < (p.minStock||10) && p.quantite > 0).length;
            const totalPurchase = products.reduce((s,p) => s + (p.prixAchat||0) * p.quantite, 0);
            const totalSaleValue = products.reduce((s,p) => s + p.prixVente * p.quantite, 0);
            let cashBalance = 0;
            try {
                const caisseOps = await apiCall('/caisse');
                cashBalance = caisseOps.reduce((s,o) => {
                    if (o.type === 'Entrée' || o.type === 'Ouverture') return s + o.montant;
                    if (o.type === 'Sortie') return s - o.montant;
                    return s;
                }, 0);
            } catch(e) {}
            const html = `
                <div class="stats-container">
                    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-content"><div class="stat-title">Produits Total</div><div class="stat-value">${products.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-content"><div class="stat-title">Ventes Aujourd'hui</div><div class="stat-value">${todaySales.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-content"><div class="stat-title">Stock Faible</div><div class="stat-value">${lowStock}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-content"><div class="stat-title">Chiffre d'Affaires</div><div class="stat-value">${formatPrice(totalRevenue)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-content"><div class="stat-title">Total Prix Achat</div><div class="stat-value">${formatPrice(totalPurchase)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-content"><div class="stat-title">Total Prix Vente</div><div class="stat-value">${formatPrice(totalSaleValue)}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-content"><div class="stat-title">Total Clients</div><div class="stat-value">${clients.length}</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💵</div><div class="stat-content"><div class="stat-title">Solde Caisse</div><div class="stat-value">${formatPrice(cashBalance)}</div></div></div>
                </div>
                <div class="table-container">
                    <div class="table-header"><div class="table-title">Dernières Ventes</div><button class="btn btn-primary new-sale-btn" onclick="window.showSaleSystem()"><i class="fas fa-plus"></i> Nouvelle Vente</button></div>
                    <table><thead><tr><th>ID</th><th>Client</th><th>Date</th><th>Montant</th><th>Statut</th></tr></thead><tbody>
                        ${ventes.slice(0,10).map(v => `<tr><td>#V-${v.id}</td><td>${v.client_name || '-'}</td><td>${new Date(v.date).toLocaleDateString()}</td><td>${formatPrice(v.montant)}</td><td>${v.paye ? '<span class="badge badge-success">Payée</span>' : '<span class="badge badge-warning">En attente</span>'}</td>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.showSaleSystem = () => loadPage('sales'); // redirige vers la page des ventes où on a le système
        }

        async function renderSaleSystem(container) {
            const products = await apiCall('/produits');
            cart = [];
            currentDiscount = 0;
            const render = () => {
                let subtotal = cart.reduce((s,item)=>s + item.price*item.quantity,0);
                let total = subtotal - currentDiscount;
                container.innerHTML = `
                    <div class="sale-container">
                        <div>
                            <div class="search-container"><i class="fas fa-search"></i><input type="text" id="productSearch" class="form-control" placeholder="Rechercher un produit..."></div>
                            <div class="products-grid" id="productsGrid"></div>
                        </div>
                        <div class="cart-container">
                            <div class="cart-header">Panier</div>
                            <div class="cart-items" id="cartItems">${cart.map((item,i) => `
                                <div class="cart-item">
                                    <div class="quantity-controls"><button class="quantity-btn" onclick="window.changeQty(${i},-1)">-</button><input type="number" class="quantity-input" value="${item.quantity}" onchange="window.setQty(${i},this.value)"><button class="quantity-btn" onclick="window.changeQty(${i},1)">+</button></div>
                                    <div class="cart-item-info"><div>${item.name}</div><div class="price-input-container"><input type="number" class="price-input" value="${item.price}" onchange="window.setPrice(${i},this.value)"></div></div>
                                    <div>${formatPrice(item.price*item.quantity)}</div>
                                    <button class="btn btn-sm btn-danger" onclick="window.removeItem(${i})"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}</div>
                            <div class="cart-summary">
                                <div class="summary-row"><span>Sous-total:</span><span id="subtotal">${formatPrice(subtotal)}</span></div>
                                <div class="summary-row"><span>Remise:</span><span id="discount">${formatPrice(currentDiscount)}</span><button class="btn btn-sm btn-primary" onclick="window.applyDiscountModal()"><i class="fas fa-percentage"></i></button></div>
                                <div class="total-row"><span>TOTAL:</span><span id="total">${formatPrice(total)}</span></div>
                            </div>
                            <div class="form-group"><label>Client</label><input id="clientName" class="form-control" placeholder="Nom du client"></div>
                            <div class="form-group"><label>Mode paiement</label><select id="paymentMethod" class="form-control"><option value="cash">Espèces</option><option value="card">Carte</option><option value="credit">Crédit</option></select></div>
                            <div class="form-group" id="cashAmountGroup" style="display:none"><label>Montant donné</label><input type="number" id="cashAmount" class="form-control" placeholder="Montant donné"></div>
                            <div class="form-group" id="changeGroup" style="display:none"><label>Monnaie à rendre</label><input type="text" id="changeAmount" class="form-control" readonly></div>
                            <button class="btn btn-success" onclick="window.completeSale()">Finaliser la Vente</button>
                        </div>
                    </div>
                `;
                const grid = document.getElementById('productsGrid');
                grid.innerHTML = products.map(p => `<div class="product-card" data-id="${p.id}"><div class="product-image"><i class="fas fa-box"></i></div><div class="product-info"><div class="product-name">${p.nom}</div><div class="product-price">${formatPrice(p.prixVente)}</div><div class="product-stock">Stock: ${p.quantite}</div></div></div>`).join('');
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = parseInt(card.dataset.id);
                        const prod = products.find(p=>p.id===id);
                        if(prod && prod.quantite>0) {
                            const existing = cart.find(i=>i.id===id);
                            if(existing) existing.quantity++;
                            else cart.push({id, name: prod.nom, price: prod.prixVente, quantity: 1});
                            render();
                        } else showToast('Stock insuffisant','error');
                    });
                });
                document.getElementById('productSearch').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = products.filter(p=>p.nom.toLowerCase().includes(term));
                    grid.innerHTML = filtered.map(p => `<div class="product-card" data-id="${p.id}"><div class="product-image"><i class="fas fa-box"></i></div><div class="product-info"><div class="product-name">${p.nom}</div><div class="product-price">${formatPrice(p.prixVente)}</div><div class="product-stock">Stock: ${p.quantite}</div></div></div>`).join('');
                    document.querySelectorAll('.product-card').forEach(card => card.addEventListener('click', () => { /* même logique */ }));
                });
                const paymentMethod = document.getElementById('paymentMethod');
                const cashGroup = document.getElementById('cashAmountGroup');
                const changeGroupDiv = document.getElementById('changeGroup');
                paymentMethod.addEventListener('change', () => {
                    if(paymentMethod.value === 'cash') { cashGroup.style.display = 'block'; changeGroupDiv.style.display = 'block'; }
                    else { cashGroup.style.display = 'none'; changeGroupDiv.style.display = 'none'; }
                });
                const cashInput = document.getElementById('cashAmount');
                if(cashInput) cashInput.addEventListener('input', () => {
                    const cash = parseFloat(cashInput.value) || 0;
                    const totalVal = parseFloat(total.replace(/[^0-9,-]/g, '').replace(',','.'));
                    const change = cash - totalVal;
                    document.getElementById('changeAmount').value = change >=0 ? formatPrice(change) : formatPrice(0);
                });
            };
            window.changeQty = (idx, delta) => {
                if(cart[idx].quantity + delta > 0) cart[idx].quantity += delta;
                else cart.splice(idx,1);
                render();
            };
            window.setQty = (idx, val) => { let q = parseInt(val); if(q>0) cart[idx].quantity = q; else cart.splice(idx,1); render(); };
            window.setPrice = (idx, val) => { let p = parseFloat(val); if(p>0) cart[idx].price = p; render(); };
            window.removeItem = (idx) => { cart.splice(idx,1); render(); };
            window.applyDiscountModal = () => {
                let subtotal = cart.reduce((s,i)=>s+i.price*i.quantity,0);
                let newDiscount = prompt(`Sous-total: ${formatPrice(subtotal)}\nEntrez le montant de la remise (FCFA):`, currentDiscount);
                if(newDiscount !== null) { currentDiscount = parseFloat(newDiscount) || 0; render(); }
            };
            window.completeSale = async () => {
                if(cart.length===0) { showToast('Panier vide','error'); return; }
                const total = cart.reduce((s,i)=>s + i.price*i.quantity,0) - currentDiscount;
                const clientName = document.getElementById('clientName').value;
                const paymentMethod = document.getElementById('paymentMethod').value;
                if(paymentMethod === 'cash') {
                    const cashGiven = parseFloat(document.getElementById('cashAmount').value) || 0;
                    if(cashGiven < total) { showToast('Montant insuffisant','error'); return; }
                }
                const saleData = {
                    client_name: clientName || 'Client non spécifié',
                    montant: total,
                    discount: currentDiscount,
                    payment_method: paymentMethod,
                    details: cart.map(i => ({ produit_id: i.id, designation: i.name, quantite: i.quantity, prix_unitaire: i.price }))
                };
                await apiCall('/ventes', 'POST', saleData);
                showToast('Vente enregistrée');
                loadSales(container);
            };
            render();
        }

            `;
            container.innerHTML = html;
            window.viewInvoice = async (id) => {
                const sale = await apiCall(`/ventes/${id}`);
                const invoiceHtml = `
                    <div id="invoiceModal" class="modal" style="display:flex">
                        <div class="modal-content" style="max-width:800px">
                            <div class="modal-header"><div class="modal-title">Facture #${sale.id}</div><button class="modal-close" onclick="closeModal('invoiceModal')">&times;</button></div>
                            <div class="modal-body">
                                <div class="invoice-container">
                                    <div class="invoice-header"><h2>FACTURE</h2><p>Date: ${new Date(sale.date).toLocaleDateString()}</p></div>
                                    <div><strong>Client:</strong> ${sale.client_name || '-'}</div>
                                    <table class="invoice-table"><thead><tr><th>Désignation</th><th>Qté</th><th>Prix U.</th><th>Total</th></tr></thead><tbody>
                                        ${sale.details.map(d => `<tr><td>${d.designation || 'Produit'}</td><td>${d.quantite}</td><td>${formatPrice(d.prix_unitaire)}</td><td>${formatPrice(d.quantite*d.prix_unitaire)}</td></tr>`).join('')}
                                    </tbody></table>
                                    <div class="invoice-totals"><div>Total: ${formatPrice(sale.montant)}</div></div>
                                    <button class="btn btn-primary print-invoice-btn" onclick="window.printInvoice(${sale.id})">Imprimer PDF</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', invoiceHtml);
            };
            window.printInvoice = async (id) => {
                const sale = await apiCall(`/ventes/${id}`);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text(`Facture #${sale.id}`, 20,20);
                doc.text(`Date: ${new Date(sale.date).toLocaleDateString()}`,20,30);
                doc.text(`Client: ${sale.client_name || '-'}`,20,40);
                let y=50;
                sale.details.forEach(d => {
                    doc.text(`${d.designation || 'Produit'} - ${d.quantite} x ${d.prix_unitaire} = ${d.quantite*d.prix_unitaire} FCFA`,20,y);
                    y+=10;
                });
                doc.text(`Total: ${sale.montant} FCFA`,20,y+10);
                doc.save(`facture_${sale.id}.pdf`);
                showToast('PDF généré');
            };
            window.recordPayment = (id, due) => {
                const montant = prompt(`Montant dû: ${formatPrice(due)}\nEntrez le montant à payer:`, due);
                if(montant && !isNaN(parseFloat(montant))) {
                    apiCall('/paiements', 'POST', { facture_id: id, montant: parseFloat(montant), date: new Date().toISOString().slice(0,10), method: 'cash' })
                        .then(() => { showToast('Paiement enregistré'); loadInvoices(container); });
                }
            };
        }

        // ==================== CAISSE ====================
        async function loadCashier(container) {
            const ops = await apiCall('/caisse');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.addCashOperation()"><i class="fas fa-plus"></i> Nouvelle Opération</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Date</th><th>Type</th><th>Montant</th><th>Description</th><th>Responsable</th></tr></thead><tbody>
                        ${ops.map(o => `<tr><td>${new Date(o.date).toLocaleString()}</td><td><span class="badge ${o.type==='Entrée'?'badge-success':'badge-danger'}">${o.type}</span></td><td>${formatPrice(o.montant)}</td><td>${o.description || ''}</td><td>${o.responsable || ''}</td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.addCashOperation = () => {
                const type = prompt('Type (Entrée/Sortie)');
                const montant = parseFloat(prompt('Montant'));
                const description = prompt('Description');
                if(type && montant) apiCall('/caisse', 'POST', { type, montant, description }).then(()=>loadCashier(container));
            };
        }

        // ==================== INVENTAIRE ====================
        async function loadInventory(container) {
            const inventaires = await apiCall('/inventaires');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.startInventory()"><i class="fas fa-clipboard-list"></i> Démarrer Inventaire</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Date</th><th>Produits</th><th>Théorique</th><th>Compté</th><th>Écart</th></tr></thead><tbody>
                        ${inventaires.map(i => `<tr><td>${new Date(i.date).toLocaleDateString()}</td><td>${JSON.parse(i.products).length}</td><td>${i.theoreticalTotal}</td><td>${i.actualTotal}</td><td class="${i.difference<0?'text-danger':'text-success'}">${i.difference}</td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.startInventory = async () => {
                const products = await apiCall('/produits');
                let items = products.map(p => ({ productId: p.id, theoretical: p.quantite, counted: p.quantite }));
                let modalHtml = `<div id="invModal" class="modal" style="display:flex"><div class="modal-content"><div class="modal-header"><div class="modal-title">Inventaire en cours</div><button class="modal-close" onclick="closeModal('invModal')">&times;</button></div><div class="modal-body">`;
                items.forEach(item => {
                    const prod = products.find(p=>p.id===item.productId);
                    modalHtml += `<div><strong>${prod.nom}</strong><br>Théorique: ${item.theoretical}<br><input type="number" id="count_${item.productId}" value="${item.counted}" placeholder="Compté"></div>`;
                });
                modalHtml += `</div><div class="modal-footer"><button class="btn btn-primary" onclick="window.saveInventory(${JSON.stringify(items).replace(/"/g, '&quot;')})">Enregistrer</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            };
            window.saveInventory = async (items) => {
                let theoreticalTotal=0, actualTotal=0;
                for(let item of items) {
                    const counted = parseInt(document.getElementById(`count_${item.productId}`).value) || 0;
                    item.counted = counted;
                    theoreticalTotal += item.theoretical;
                    actualTotal += counted;
                }
                const difference = actualTotal - theoreticalTotal;
                await apiCall('/inventaires', 'POST', { date: new Date().toISOString(), products: items, theoreticalTotal, actualTotal, difference });
                closeModal('invModal');
                showToast('Inventaire enregistré');
                loadInventory(container);
            };
        }

        // ==================== RAPPORTS ====================
        async function loadReports(container) {
            const ventes = await apiCall('/ventes');
            const monthly = Array(12).fill(0);
            ventes.forEach(v => { const m = new Date(v.date).getMonth(); monthly[m] += v.montant; });
            container.innerHTML = `<div class="chart-card"><canvas id="monthlyChart"></canvas></div>`;
            new Chart(document.getElementById('monthlyChart'), { type: 'bar', data: { labels: ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'], datasets: [{ label: 'Ventes mensuelles', data: monthly, backgroundColor: '#3498db' }] } });
        }

        // ==================== UTILISATEURS (admin only) ====================
        async function loadUsers(container) {
            if(currentUser.role !== 'admin') {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-ban"></i><p>Accès réservé aux administrateurs</p></div>';
                return;
            }
            const users = await apiCall('/users');
            const html = `
                <div style="margin-bottom:20px"><button class="btn btn-primary" onclick="window.showUserModal()"><i class="fas fa-plus"></i> Ajouter Utilisateur</button></div>
                <div class="table-container">
                    <table><thead><tr><th>Nom</th><th>Username</th><th>Rôle</th><th>Email</th><th>Actions</th></tr></thead><tbody>
                        ${users.map(u => `<tr><td>${u.fullName}</td><td>${u.username}</td><td>${u.role}</td><td>${u.email || '-'}</td><td><button class="btn btn-sm btn-danger" onclick="window.deleteUser(${u.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            container.innerHTML = html;
            window.showUserModal = () => showUserModalForm();
            window.deleteUser = async (id) => {
                if(confirm('Supprimer cet utilisateur ?')) {
                    await apiCall(`/users/${id}`, 'DELETE');
                    showToast('Utilisateur supprimé');
                    loadUsers(container);
                }
            };
        }

        async function showUserModalForm() {
            const modalHtml = `
                <div id="userModal" class="modal" style="display:flex">
                    <div class="modal-content">
                        <div class="modal-header"><div class="modal-title">Ajouter Utilisateur</div><button class="modal-close" onclick="closeModal('userModal')">&times;</button></div>
                        <div class="modal-body">
                            <div class="form-group"><label>Nom complet</label><input id="user_fullName" class="form-control"></div>
                            <div class="form-group"><label>Nom d'utilisateur</label><input id="user_username" class="form-control"></div>
                            <div class="form-group"><label>Mot de passe</label><input id="user_password" type="password" class="form-control"></div>
                            <div class="form-group"><label>Email</label><input id="user_email" class="form-control"></div>
                            <div class="form-group"><label>Rôle</label><select id="user_role" class="form-control"><option>vendeur</option><option>caissier</option><option>gestionnaire</option><option>admin</option></select></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-primary" onclick="window.saveUser()">Enregistrer</button></div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.saveUser = async () => {
            const data = {
                fullName: document.getElementById('user_fullName').value,
                username: document.getElementById('user_username').value,
                password: document.getElementById('user_password').value,
                email: document.getElementById('user_email').value,
                role: document.getElementById('user_role').value
            };
            await apiCall('/users', 'POST', data);
            closeModal('userModal');
            showToast('Utilisateur créé');
            loadPage('users');
        };

        // ==================== PARAMÈTRES ====================
        async function loadSettings(container) {
            const settings = await apiCall('/settings/store');
            const html = `
                <div class="form-container">
                    <h3>Paramètres du magasin</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Nom</label><input id="store_nom" class="form-control" value="${settings.nom || ''}"></div>
                        <div class="form-group"><label>Téléphone</label><input id="store_telephone" class="form-control" value="${settings.telephone || ''}"></div>
                        <div class="form-group"><label>Email</label><input id="store_email" class="form-control" value="${settings.email || ''}"></div>
                        <div class="form-group"><label>Adresse</label><input id="store_adresse" class="form-control" value="${settings.adresse || ''}"></div>
                        <div class="form-group"><label>Devise</label><input id="store_currency" class="form-control" value="${settings.currency || 'FCFA'}"></div>
                    </div>
                    <button class="btn btn-primary" onclick="window.saveSettings()">Enregistrer</button>
                </div>
            `;
            container.innerHTML = html;
            window.saveSettings = async () => {
                const data = {
                    nom: document.getElementById('store_nom').value,
                    telephone: document.getElementById('store_telephone').value,
                    email: document.getElementById('store_email').value,
                    adresse: document.getElementById('store_adresse').value,
                    currency: document.getElementById('store_currency').value,
                    language: 'fr'
                };
                await apiCall('/settings/store', 'POST', data);
                showToast('Paramètres enregistrés');
            };
        }

        // ==================== AUTHENTIFICATION ====================
        async function init() {
            const storedToken = localStorage.getItem('token');
            const storedUser = localStorage.getItem('user');
            if(storedToken && storedUser) {
                token = storedToken;
                currentUser = JSON.parse(storedUser);
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('user-name').innerText = currentUser.fullName;
                document.getElementById('user-role').innerText = currentUser.role === 'admin' ? 'Administrateur' : currentUser.role;
                document.getElementById('user-avatar').innerText = currentUser.fullName.charAt(0).toUpperCase();
                loadPage('dashboard');
            } else {
                document.getElementById('login-page').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('user-name').innerText = currentUser.fullName;
                document.getElementById('user-role').innerText = currentUser.role === 'admin' ? 'Administrateur' : currentUser.role;
                document.getElementById('user-avatar').innerText = currentUser.fullName.charAt(0).toUpperCase();
                loadPage('dashboard');
            } catch(err) {
                showToast(err.message, 'error');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        });

        init();
    </script>
</body>
</html>
